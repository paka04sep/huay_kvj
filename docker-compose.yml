services:
  redis:
    image: redis:alpine
    container_name: lottery-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lottery-api
    command: uvicorn backend.api.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app/backend
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=INFO
      - ALLOWED_ORIGINS=http://localhost:3000
    depends_on:
      - redis
    restart: unless-stopped

  backend-scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lottery-scheduler
    command: python backend/data_collection/scheduler.py
    volumes:
      - ./backend:/app/backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=INFO
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis-data:
